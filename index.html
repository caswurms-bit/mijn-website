    <!-- Google tag (gtag.js) — AW-18345076370. Eén keer, hier in <head>,
         zodat 'm op elke pagina laadt (deze site gebruikt volledige
         paginanavigaties, geen client-side router, dus dit is voldoende
         voor correcte page_view-tracking op elke route). -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=AW-18345076370"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      // Google Consent Mode v2 — standaard alles geweigerd totdat een
      // cookiebanner/CMP de daadwerkelijke keuze van de bezoeker doorgeeft
      // via gtag('consent', 'update', {...}). Deze default-aanroep moet vóór
      // gtag('js', ...) en gtag('config', ...) staan, zodat er nooit tags
      // met impliciete toestemming vuren. Er is momenteel geen cookiebanner
      // in dit project — zodra die er komt, moet die op de daadwerkelijke
      // keuze van de bezoeker 'consent update' aanroepen.
      gtag('consent', 'default', {
        'ad_storage': 'denied',
        'ad_user_data': 'denied',
        'ad_personalization': 'denied',
        'analytics_storage': 'denied'
      });
      gtag('js', new Date());
      gtag('config', 'AW-18345076370');
    </script>

    <script type="text/javascript" src="//widget.trustpilot.com/bootstrap/v5/tp.widget.bootstrap.min.js" async></script>
  </head>
